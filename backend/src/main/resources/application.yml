spring:
  application:
    name: openclaw-orchestrator

  datasource:
    url: jdbc:mysql://localhost:3306/openclaw_orchestrator?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root@123456!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080
  cors:
    allowed-origins: "http://localhost:5173"

logging:
  level:
    com.openclaw: DEBUG

jwt:
  secret: openclaw-orchestrator-jwt-secret-key-change-in-production-2024
  expiration: 86400000  # 24 hours in milliseconds
