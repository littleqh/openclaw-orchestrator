spring:
  application:
    name: openclaw-orchestrator

  datasource:
    url: jdbc:mysql://localhost:3306/openclaw_orchestrator?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080
  cors:
    allowed-origins: "http://localhost:5173"

logging:
  level:
    com.openclaw: DEBUG
